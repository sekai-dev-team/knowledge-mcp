version: "3.8"

services:
  knowledge-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-mcp
    volumes:
      - vault_data:/vault
      - knowledge_data:/data
      - hf_cache:/root/.cache/huggingface
      - /opt/data/ssh:/root/.ssh:ro
    restart: unless-stopped
    networks:
      - hermes-net

  hermes-agent:
    image: hermes-agent:latest
    networks:
      - hermes-net
    depends_on:
      - knowledge-mcp

networks:
  hermes-net:
    driver: bridge

volumes:
  vault_data:
    external: true
  knowledge_data:
    external: true
  hf_cache:
    external: true
